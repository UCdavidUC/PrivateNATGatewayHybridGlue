AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS Glue private connectivity to on-premises databases via VPN.
  Uses a private NAT Gateway (no IGW) to funnel all Glue traffic through
  a single private IP for firewall whitelisting. Zero internet exposure.
  Creates the NAT subnet and gateway, or reuses an existing subnet.

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC with existing VPN/DX connectivity to on-premises

  VpcCidr:
    Type: String
    Description: VPC CIDR block (used for VPC endpoint security group rules)
    AllowedPattern: '(\d{1,3}\.){3}\d{1,3}/\d{1,2}'

  GlueSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: >
      Private subnets where Glue ENIs will be created.
      Route tables will be updated to send on-prem traffic through the NAT Gateway.

  GlueSubnetCount:
    Type: Number
    Default: 1
    AllowedValues: [1, 2, 3]
    Description: Number of Glue subnets provided in GlueSubnetIds

  ExistingNatSubnetId:
    Type: String
    Default: ''
    Description: >
      (Optional) Existing private subnet ID for the NAT Gateway.
      Leave empty to create a new subnet using NatSubnetCidr and NatSubnetAz.
      If provided, NatSubnetCidr and NatSubnetAz are ignored.

  NatSubnetCidr:
    Type: String
    Default: ''
    Description: >
      CIDR block for the new NAT Gateway subnet (e.g. 10.0.100.0/28).
      Required when ExistingNatSubnetId is empty. Must be within the VPC CIDR
      and not overlap with existing subnets.
    AllowedPattern: '((\d{1,3}\.){3}\d{1,3}/\d{1,2})?'
    ConstraintDescription: Must be a valid CIDR block or empty

  NatSubnetAz:
    Type: String
    Default: ''
    Description: >
      Availability Zone for the new NAT subnet (e.g. us-east-1a).
      Required when ExistingNatSubnetId is empty.

  VgwOrTgwId:
    Type: String
    Description: >
      Virtual Private Gateway (vgw-xxx) or Transit Gateway (tgw-xxx) ID
      used for routing on-premises traffic from the NAT subnet.

  VgwOrTgwType:
    Type: String
    AllowedValues: [VGW, TGW]
    Default: VGW
    Description: Whether VgwOrTgwId is a Virtual Private Gateway or Transit Gateway

  NatPrivateIp:
    Type: String
    Description: >
      Fixed private IP for the NAT Gateway (must be within the NAT subnet CIDR).
      This is the single IP to whitelist in the on-premises firewall.
    AllowedPattern: '(\d{1,3}\.){3}\d{1,3}'

  OnPremisesCidr:
    Type: String
    Description: On-premises CIDR block reachable via VPN (e.g. 10.0.0.0/8)
    AllowedPattern: '(\d{1,3}\.){3}\d{1,3}/\d{1,2}'

  OnPremDbPort:
    Type: Number
    Default: 1521
    Description: On-premises database listener port

  GlueConnectionName:
    Type: String
    Default: onprem-vpn-connection

  GlueJobRoleName:
    Type: String
    Default: glue-onprem-role
    Description: Name for the IAM role used by Glue jobs

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: VPC & Networking
        Parameters:
          - VpcId
          - VpcCidr
          - OnPremisesCidr
          - VgwOrTgwId
          - VgwOrTgwType
      - Label:
          default: Glue Subnets
        Parameters:
          - GlueSubnetIds
          - GlueSubnetCount
      - Label:
          default: NAT Gateway Subnet
        Parameters:
          - ExistingNatSubnetId
          - NatSubnetCidr
          - NatSubnetAz
          - NatPrivateIp
      - Label:
          default: On-Premises & Glue
        Parameters:
          - OnPremDbPort
          - GlueConnectionName
          - GlueJobRoleName

Conditions:
  CreateNatSubnet: !Equals [!Ref ExistingNatSubnetId, '']
  HasSecondGlueSubnet: !Or
    - !Equals [!Ref GlueSubnetCount, 2]
    - !Equals [!Ref GlueSubnetCount, 3]
  HasThirdGlueSubnet: !Equals [!Ref GlueSubnetCount, 3]
  IsVgw: !Equals [!Ref VgwOrTgwType, 'VGW']
  IsTgw: !Equals [!Ref VgwOrTgwType, 'TGW']
  CreateNatSubnetWithVgw: !And
    - !Condition CreateNatSubnet
    - !Condition IsVgw
  CreateNatSubnetWithTgw: !And
    - !Condition CreateNatSubnet
    - !Condition IsTgw

Rules:
  ValidateNewSubnetParams:
    RuleCondition: !Equals [!Ref ExistingNatSubnetId, '']
    Assertions:
      - Assert: !Not [!Equals [!Ref NatSubnetCidr, '']]
        AssertDescription: >
          NatSubnetCidr is required when ExistingNatSubnetId is not provided.
          Specify a CIDR block for the new NAT Gateway subnet.
      - Assert: !Not [!Equals [!Ref NatSubnetAz, '']]
        AssertDescription: >
          NatSubnetAz is required when ExistingNatSubnetId is not provided.
          Specify an Availability Zone for the new NAT Gateway subnet.

Resources:

  # ---------------------------------------------------------------
  # NAT Gateway Subnet (created only if ExistingNatSubnetId is empty)
  # ---------------------------------------------------------------
  NatSubnet:
    Type: AWS::EC2::Subnet
    Condition: CreateNatSubnet
    Properties:
      VpcId: !Ref VpcId
      CidrBlock: !Ref NatSubnetCidr
      AvailabilityZone: !Ref NatSubnetAz
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: glue-private-nat-subnet

  # Route table for the NAT subnet - routes on-prem traffic to VGW/TGW
  NatSubnetRouteTable:
    Type: AWS::EC2::RouteTable
    Condition: CreateNatSubnet
    Properties:
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: glue-nat-subnet-rt

  NatSubnetRtAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: CreateNatSubnet
    Properties:
      SubnetId: !Ref NatSubnet
      RouteTableId: !Ref NatSubnetRouteTable

  # Route on-prem traffic from NAT subnet to VGW
  NatSubnetRouteVgw:
    Type: AWS::EC2::Route
    Condition: CreateNatSubnetWithVgw
    Properties:
      RouteTableId: !Ref NatSubnetRouteTable
      DestinationCidrBlock: !Ref OnPremisesCidr
      GatewayId: !Ref VgwOrTgwId

  # Route on-prem traffic from NAT subnet to TGW
  NatSubnetRouteTgw:
    Type: AWS::EC2::Route
    Condition: CreateNatSubnetWithTgw
    Properties:
      RouteTableId: !Ref NatSubnetRouteTable
      DestinationCidrBlock: !Ref OnPremisesCidr
      TransitGatewayId: !Ref VgwOrTgwId

  # NACL for NAT subnet - restrict to on-prem and VPC traffic only
  NatSubnetNacl:
    Type: AWS::EC2::NetworkAcl
    Condition: CreateNatSubnet
    Properties:
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: glue-nat-subnet-nacl

  NatSubnetNaclAssociation:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Condition: CreateNatSubnet
    Properties:
      SubnetId: !Ref NatSubnet
      NetworkAclId: !Ref NatSubnetNacl

  # Allow outbound to on-premises (database port)
  NatSubnetNaclEgressOnPrem:
    Type: AWS::EC2::NetworkAclEntry
    Condition: CreateNatSubnet
    Properties:
      NetworkAclId: !Ref NatSubnetNacl
      RuleNumber: 100
      Protocol: 6
      RuleAction: allow
      Egress: true
      CidrBlock: !Ref OnPremisesCidr
      PortRange:
        From: !Ref OnPremDbPort
        To: !Ref OnPremDbPort

  # Allow inbound from VPC (NAT Gateway receives traffic from Glue subnets)
  NatSubnetNaclIngressVpc:
    Type: AWS::EC2::NetworkAclEntry
    Condition: CreateNatSubnet
    Properties:
      NetworkAclId: !Ref NatSubnetNacl
      RuleNumber: 100
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: !Ref VpcCidr
      PortRange:
        From: !Ref OnPremDbPort
        To: !Ref OnPremDbPort

  # Allow return traffic from on-premises (ephemeral ports)
  NatSubnetNaclIngressReturn:
    Type: AWS::EC2::NetworkAclEntry
    Condition: CreateNatSubnet
    Properties:
      NetworkAclId: !Ref NatSubnetNacl
      RuleNumber: 200
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: !Ref OnPremisesCidr
      PortRange:
        From: 1024
        To: 65535

  # Allow ephemeral return traffic outbound to VPC
  NatSubnetNaclEgressReturn:
    Type: AWS::EC2::NetworkAclEntry
    Condition: CreateNatSubnet
    Properties:
      NetworkAclId: !Ref NatSubnetNacl
      RuleNumber: 200
      Protocol: 6
      RuleAction: allow
      Egress: true
      CidrBlock: !Ref VpcCidr
      PortRange:
        From: 1024
        To: 65535

  # ---------------------------------------------------------------
  # Private NAT Gateway - single private IP, no EIP, no IGW
  # ---------------------------------------------------------------
  PrivateNatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      ConnectivityType: private
      SubnetId: !If
        - CreateNatSubnet
        - !Ref NatSubnet
        - !Ref ExistingNatSubnetId
      PrivateIpAddress: !Ref NatPrivateIp
      Tags:
        - Key: Name
          Value: glue-private-nat-gw

  # ---------------------------------------------------------------
  # Route table for Glue subnets - on-prem traffic via NAT GW
  # ---------------------------------------------------------------
  GlueRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: glue-subnets-rt

  OnPremRouteViaNat:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref GlueRouteTable
      DestinationCidrBlock: !Ref OnPremisesCidr
      NatGatewayId: !Ref PrivateNatGateway

  GlueSubnetRtAssociation0:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Select [0, !Ref GlueSubnetIds]
      RouteTableId: !Ref GlueRouteTable

  GlueSubnetRtAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: HasSecondGlueSubnet
    Properties:
      SubnetId: !Select [1, !Ref GlueSubnetIds]
      RouteTableId: !Ref GlueRouteTable

  GlueSubnetRtAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: HasThirdGlueSubnet
    Properties:
      SubnetId: !Select [2, !Ref GlueSubnetIds]
      RouteTableId: !Ref GlueRouteTable

  # ---------------------------------------------------------------
  # Security Group for Glue ENIs
  # ---------------------------------------------------------------
  GlueSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Glue ENIs - on-premises database via private NAT GW
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: !Ref OnPremDbPort
          ToPort: !Ref OnPremDbPort
          CidrIp: !Ref OnPremisesCidr
          Description: On-premises database access via VPN
      Tags:
        - Key: Name
          Value: glue-onprem-sg

  GlueSgSelfIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref GlueSecurityGroup
      IpProtocol: tcp
      FromPort: 0
      ToPort: 65535
      SourceSecurityGroupId: !Ref GlueSecurityGroup
      Description: Glue inter-node communication (required)

  GlueSgSelfEgress:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref GlueSecurityGroup
      IpProtocol: tcp
      FromPort: 0
      ToPort: 65535
      DestinationSecurityGroupId: !Ref GlueSecurityGroup
      Description: Glue inter-node communication (required)

  # ---------------------------------------------------------------
  # Glue NETWORK Connection
  # ---------------------------------------------------------------
  GlueVpcConnection:
    Type: AWS::Glue::Connection
    Properties:
      CatalogId: !Ref AWS::AccountId
      ConnectionInput:
        Name: !Ref GlueConnectionName
        ConnectionType: NETWORK
        PhysicalConnectionRequirements:
          AvailabilityZone: !Select [0, !GetAZs '']
          SubnetId: !Select [0, !Ref GlueSubnetIds]
          SecurityGroupIdList:
            - !Ref GlueSecurityGroup
        ConnectionProperties: {}

  # ---------------------------------------------------------------
  # IAM Role for Glue Jobs
  # ---------------------------------------------------------------
  GlueJobRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref GlueJobRoleName
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: GlueNetworkingPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # ENI lifecycle for VPC-bound Glue jobs
              - Sid: GlueEniManagement
                Effect: Allow
                Action:
                  - ec2:CreateNetworkInterface
                  - ec2:DeleteNetworkInterface
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeSubnets
                  - ec2:DescribeVpcAttribute
                  - ec2:DescribeRouteTables
                  - ec2:DescribeVpcEndpoints
                  - ec2:CreateTags
                  - ec2:DeleteTags
                Resource: '*'
              # Glue connection access
              - Sid: GlueConnectionAccess
                Effect: Allow
                Action:
                  - glue:GetConnection
                  - glue:GetConnections
                Resource:
                  - !Sub arn:aws:glue:${AWS::Region}:${AWS::AccountId}:connection/${GlueConnectionName}
                  - !Sub arn:aws:glue:${AWS::Region}:${AWS::AccountId}:catalog
              # CloudWatch Logs for Glue job output
              - Sid: GlueLogging
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:GetLogEvents
                Resource:
                  - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws-glue/*

  # ---------------------------------------------------------------
  # VPC Endpoints - Glue needs AWS service access without internet
  # ---------------------------------------------------------------
  S3VpcEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub com.amazonaws.${AWS::Region}.s3
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref GlueRouteTable

  GlueVpcEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub com.amazonaws.${AWS::Region}.glue
      VpcEndpointType: Interface
      SubnetIds: !Ref GlueSubnetIds
      SecurityGroupIds:
        - !Ref VpcEndpointSecurityGroup
      PrivateDnsEnabled: true

  VpcEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow VPC to reach VPC endpoints over HTTPS
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref VpcCidr
          Description: HTTPS from VPC for VPC endpoints
      Tags:
        - Key: Name
          Value: vpc-endpoints-sg

Outputs:
  NatGatewayPrivateIp:
    Description: >
      Single private IP to whitelist in the on-premises firewall.
      All Glue traffic to on-premises originates from this IP.
    Value: !Ref NatPrivateIp

  NatSubnetId:
    Description: Subnet ID where the NAT Gateway is deployed
    Value: !If
      - CreateNatSubnet
      - !Ref NatSubnet
      - !Ref ExistingNatSubnetId

  GlueSecurityGroupId:
    Description: Security group attached to Glue ENIs
    Value: !Ref GlueSecurityGroup

  GlueConnectionName:
    Description: Reference this connection name in your Glue jobs
    Value: !Ref GlueConnectionName

  GlueJobRoleArn:
    Description: IAM Role ARN for Glue jobs
    Value: !GetAtt GlueJobRole.Arn

  TrafficFlow:
    Description: How traffic flows (no internet involved)
    Value: >
      Glue ENI (Glue subnet) -> Private NAT GW (single private IP)
      -> VGW/TGW -> VPN tunnel -> On-premises database
